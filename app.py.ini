# 設定表格樣式：將「已完備」上色
def highlight_status(val):
    color = '#D4EDDA' if val == '已完備' else '#FFF3CD'
    return f'background-color: {color}'

st.dataframe(df.style.applymap(highlight_status, subset=['狀態']), 
             use_container_width=True, 
             hide_index=True)

